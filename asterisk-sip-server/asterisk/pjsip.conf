; =============================================================
; PJSIP Configuration for Customer Support WebRTC
; =============================================================

; ---------- Transports ----------

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089
cert_file=__CERT_FILE__
priv_key_file=__KEY_FILE__

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

; ---------- WebRTC Endpoint Template ----------

[webrtc-endpoint](!)
type=endpoint
context=support
disallow=all
allow=opus
allow=ulaw
allow=alaw
dtls_auto_generate_cert=yes
webrtc=yes
media_encryption=dtls
dtls_verify=fingerprint
dtls_setup=actpass
ice_support=yes
media_use_received_transport=yes
rtcp_mux=yes
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes

; ---------- Agent Endpoint (Central Dashboard) ----------

[agent]
type=endpoint
context=support
disallow=all
allow=opus
allow=ulaw
allow=alaw
dtls_auto_generate_cert=yes
webrtc=yes
media_encryption=dtls
dtls_verify=fingerprint
dtls_setup=actpass
ice_support=yes
media_use_received_transport=yes
rtcp_mux=yes
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes
auth=agent-auth
aors=agent
callerid="Support Agent" <100>

[agent-auth]
type=auth
auth_type=userpass
username=agent
password=__AGENT_PASSWORD__

[agent]
type=aor
max_contacts=5
remove_existing=yes

