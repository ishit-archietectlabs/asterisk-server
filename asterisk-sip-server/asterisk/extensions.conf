; =============================================================
; Asterisk Dialplan for Customer Support System
; =============================================================

[general]
static=yes
writeprotect=no

[globals]

[support]
; ---- Client calls Agent ----
; When any client dials 100, ring the agent
exten => 100,1,NoOp(Incoming support call from ${CALLERID(all)})
 same => n,Set(CALLERID(name)=${CALLERID(name)})
 same => n,Dial(PJSIP/agent,60,r)
 same => n,VoiceMail(100@default,u)
 same => n,Hangup()

; ---- Agent calls Client ----
; Agent dials 201-205 to call back clients
exten => 201,1,NoOp(Agent calling Client Site 1)
 same => n,Dial(PJSIP/client_1,60,r)
 same => n,Hangup()

exten => 202,1,NoOp(Agent calling Client Site 2)
 same => n,Dial(PJSIP/client_2,60,r)
 same => n,Hangup()

exten => 203,1,NoOp(Agent calling Client Site 3)
 same => n,Dial(PJSIP/client_3,60,r)
 same => n,Hangup()

exten => 204,1,NoOp(Agent calling Client Site 4)
 same => n,Dial(PJSIP/client_4,60,r)
 same => n,Hangup()

exten => 205,1,NoOp(Agent calling Client Site 5)
 same => n,Dial(PJSIP/client_5,60,r)
 same => n,Hangup()

; ---- Echo test for debugging ----
exten => 999,1,NoOp(Echo test)
 same => n,Answer()
 same => n,Echo()
 same => n,Hangup()

; ---- Custom UI Route Config ----
#tryinclude /data/custom_extensions.conf
