; PJSIP Configuration for Customer Support WebRTC
; =============================================================

[global]
type=global
user_agent=HA-Asterisk
endpoint_identifier_order=username,ip
external_media_address=<PUBLIC_IP>
external_signaling_address=<PUBLIC_IP>
local_net=192.168.1.0/24

; ---------- Transports ----------

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089
cert_file=/ssl/fullchain.pem
priv_key_file=/ssl/privkey.pem

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

; ---------- WebRTC Endpoint Template ----------

[webrtc-endpoint](!)
type=endpoint
context=support
disallow=all
allow=opus
allow=ulaw
allow=alaw
dtls_auto_generate_cert=yes
webrtc=yes
media_encryption=dtls
dtls_verify=fingerprint
dtls_setup=actpass
ice_support=yes
media_use_received_transport=yes
rtcp_mux=yes
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes

; ---------- Agent Endpoint (Central Dashboard) ----------

[agent]
type=endpoint
context=support
disallow=all
allow=opus,ulaw,alaw
webrtc=yes
dtls_auto_generate_cert=yes
ice_support=yes
media_encryption=dtls
dtls_verify=fingerprint
dtls_setup=actpass
auth=agent
aors=agent
transport=transport-wss
callerid="Support Agent" <100>

[agent]
type=auth
auth_type=userpass
username=agent
password=__AGENT_PASSWORD__

[agent]
type=aor
max_contacts=5
remove_existing=yes

